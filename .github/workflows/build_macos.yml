name: Apple Silicon
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Qt5
        run: |
          brew update
          brew install qt@5
          brew link qt@5 --force
      - name: Debug Qt5 Installation
        run: |
          echo "Checking Qt5 installation..."
          ls -l /usr/local/opt/qt@5/bin || true
          ls -l /opt/homebrew/opt/qt@5/bin || true
          which qmake
          qmake --version || true
      - name: Set up Xcode command-line tools
        run: |
          sudo xcode-select --switch /Applications/Xcode.app
          xcode-select --install || true
      - name: Build ftplib
        run: |
          git clone https://github.com/DoctorW00/qtftp.git
          cd qtftp
          /opt/homebrew/opt/qt@5/bin/qmake CONFIG+=release || /usr/local/opt/qt@5/bin/qmake CONFIG+=release
          make
          sudo make install
      - name: Build unrar library
        run: |
          cd unrar
          make clean
          make lib CXXFLAGS="-arch arm64"
          mv libunrar.so libunrar.dylib
          ls -la
      - name: Create entitlements.plist
        run: |
          cat > entitlements.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.app-sandbox</key>
              <false/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.allow-dyld-environment-variables</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
              <key>com.apple.security.files.downloads.read-write</key>
              <true/>
              <key>com.apple.security.files.user-selected.read-write</key>
              <true/>
              <key>com.apple.security.cs.disable-executable-page-protection</key>
              <true/>
          </dict>
          </plist>
          EOF
          cat entitlements.plist
          plutil -lint entitlements.plist || { echo "entitlements.plist is invalid"; exit 1; }
      - name: Build C++ with Qt5
        run: |
          mkdir build
          cd build
          /opt/homebrew/opt/qt@5/bin/qmake ../ CONFIG+=release || /usr/local/opt/qt@5/bin/qmake ../ CONFIG+=release
          make -j$(sysctl -n hw.ncpu)
      - name: Use macdeployqt to deploy the app
        run: |
          /opt/homebrew/opt/qt@5/bin/macdeployqt build/SFDLSaugerPro.app -verbose=2
      - name: Create Info.plist
        run: |
          APP_BUNDLE="build/SFDLSaugerPro.app"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          if [ -f "icon.icns" ]; then
            cp icon.icns "$APP_BUNDLE/Contents/Resources/"
          fi
          cat > "$APP_BUNDLE/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>SFDLSaugerPro</string>
              <key>CFBundleIconFile</key>
              <string>icon.icns</string>
              <key>CFBundleIdentifier</key>
              <string>com.grafsauger.sfdlsaugerpro</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleSignature</key>
              <string>????</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.13</string>
              <key>NSDocumentsFolderUsageDescription</key>
              <string>Bitte wähle einen Ordner, in dem Daten gespeichert werden sollen.</string>
              <key>NSDownloadsFolderUsageDescription</key>
              <string>Bitte wähle einen Ordner, in dem Daten gespeichert werden sollen.</string>
          </dict>
          </plist>
          EOF
      - name: Copy unrar lib to SFDLSaugerPro.app
        run: |
          mkdir -p build/SFDLSaugerPro.app/Contents/Frameworks/
          cp unrar/libunrar.dylib build/SFDLSaugerPro.app/Contents/Frameworks/libunrar.dylib
          install_name_tool -change libunrar.so @executable_path/../Frameworks/libunrar.dylib build/SFDLSaugerPro.app/Contents/MacOS/SFDLSaugerPro
      - name: Sign the app bundle
        run: |
          xattr -cr build/SFDLSaugerPro.app
          find build/SFDLSaugerPro.app/Contents/Frameworks -name "*.framework" -exec codesign --force --sign "-" --timestamp=none {} \;
          find build/SFDLSaugerPro.app/Contents/Frameworks -name "*.dylib" -exec codesign --force --sign "-" --timestamp=none {} \;
          if [ -d "build/SFDLSaugerPro.app/Contents/PlugIns" ]; then
            find build/SFDLSaugerPro.app/Contents/PlugIns -name "*.dylib" -exec codesign --force --sign "-" --timestamp=none {} \;
          fi
          codesign --force --sign "-" --entitlements entitlements.plist --timestamp=none build/SFDLSaugerPro.app
          codesign -vvv --deep --strict build/SFDLSaugerPro.app
      - name: Create DMG package
        run: |
          hdiutil create -volname "SFDLSaugerPro" -srcfolder build/SFDLSaugerPro.app -ov -format UDZO build/SFDLSaugerPro.dmg
          codesign --force --sign "-" build/SFDLSaugerPro.dmg
      - name: Upload .dmg Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/SFDLSaugerPro.dmg

