name: Build Windows Qt5 C++ Shared
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: 'win64_msvc2019_64' 
          cache: true

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenSSL
        run: |
          choco install openssl -y --no-progress

      - name: Build and Install qtftp Library
        shell: cmd
        run: |
          git clone https://github.com/DoctorW00/qtftp.git
          cd qtftp\src\qftp
          qmake
          nmake
          nmake install

      - name: Deploy Prebuilt unrar Library
        shell: cmd
        run: |
          cd unrardll
          copy x64\UnRAR64.lib .\unrar.lib
          if not exist ..\unrar mkdir ..\unrar
          copy x64\UnRAR64.lib ..\unrar\unrar.lib
          if not exist ..\release mkdir ..\release
          copy x64\UnRAR64.dll ..\release\unrar.dll

      - name: Build Application
        shell: cmd
        run: |
          qmake
          nmake

      - name: Deploy Qt Dependencies (windeployqt)
        shell: cmd
        run: |
          cd release
          windeployqt --verbose 1 SFDLSaugerPro.exe
          
      - name: Copy OpenSSL DLLs to Release
        shell: powershell
        run: |
          $openssl_dir = "C:\Program Files\OpenSSL*"
          if (Test-Path $openssl_dir) {
              Get-ChildItem -Path $openssl_dir -Filter "*.dll" -Recurse | Where-Object { $_.Name -like "libcrypto*" -or $_.Name -like "libssl*" } | ForEach-Object {
                  Copy-Item -Path $_.FullName -Destination "release\" -Force
              }
          }

      - name: Clean Build Garbage from Release
        shell: powershell
        run: |
          if (Test-Path "release") {
              Get-ChildItem -Path "release" -Include "*.obj","*.cpp","*.h","*.res","*.moc","*.exp" -Recurse | Remove-Item -Force
          }

      - name: Extract version from .pro file
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep -E '^[[:space:]]*VERSION[[:space:]]*=' *.pro | sed 's/.*=[[:space:]]*//' | tr -d '"' | tr -d "'")
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create ZIP Package
        shell: powershell
        run: |
          Compress-Archive -Path release\* -DestinationPath .\SFDLSaugerPro-windows-v$($env:APP_VERSION).zip

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SFDLSaugerPro-windows-v${{ env.APP_VERSION }}
          path: "release/"

