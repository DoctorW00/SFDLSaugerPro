name: Build ALL and RELEASE

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  PATH: /usr/local/bin:/usr/bin:/bin

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract version from .pro file
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep -E '^[[:space:]]*VERSION[[:space:]]*=' *.pro | sed 's/.*=[[:space:]]*//' | tr -d '"' | tr -d "'" | tr -d '\r')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "GITHUB_REF_NAME=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Process All Workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          export GITHUB_TOKEN="$GH_TOKEN"

          WORKFLOWS=(
            "Build Linux AppImage x86_64 Qt5 C++;linux_x64_appimage;true;"
            "Build Linux AppImage ARM64 Qt5 C++;linux_arm64_appimage;true;"
            "Build Apple Silicon C++ Qt5;apple_silicon;true;"
            "Build Apple Intel C++ Qt5;apple_intel;true;"
            "Build Native Linux Packages Qt5 C++;linux_native_x86;true;native-packages-x86_64"
            "Build Native Linux Packages Qt5 C++;linux_native_arm;true;native-packages-arm64"
            "Build Windows Qt5 C++ Shared;windows_shared;false;SFDLSaugerPro-windows-v$APP_VERSION"
            "Build Windows Qt5 C++ Shared;windows_installer;true;SFDLSaugerPro-windows-v$APP_VERSION-Installer"
          )

          echo "Triggering child workflows..."
          TRIGGERED_WORKFLOWS=()
          for item in "${WORKFLOWS[@]}"; do
            IFS=";" read -r wf_name wf_dir unzip_flag art_name <<< "$item"
            # dedupe by name
            if [[ ! " ${TRIGGERED_WORKFLOWS[*]} " =~ " ${wf_name} " ]]; then
              gh workflow run "$wf_name" --ref "$GITHUB_REF_NAME"
              TRIGGERED_WORKFLOWS+=("$wf_name")
            fi
          done

          echo "Waiting 20 seconds for GitHub to register new runs..."
          sleep 20

          mkdir -p ./release-artifacts

          echo "Monitoring child workflows..."
          while true; do
            all_completed=true
            any_failed=false

            for item in "${WORKFLOWS[@]}"; do
              IFS=";" read -r wf_name wf_dir unzip_flag art_name <<< "$item"

              RUN_DATA=$(gh run list --workflow="$wf_name" --branch="$GITHUB_REF_NAME" --event=workflow_dispatch --limit 1 --json status,conclusion 2>/dev/null || echo "[]")

              STATUS=$(echo "$RUN_DATA" | jq -r '.[0].status // empty' || true)
              CONCLUSION=$(echo "$RUN_DATA" | jq -r '.[0].conclusion // empty' || true)

              if [ -z "$STATUS" ] || [ "$STATUS" = "null" ]; then
                STATUS="unknown"
              fi
              if [ -z "$CONCLUSION" ] || [ "$CONCLUSION" = "null" ]; then
                CONCLUSION="pending"
              fi

              echo "Workflow: '$wf_name' -> Status: $STATUS | Conclusion: $CONCLUSION"

              if [ "$STATUS" = "unknown" ] || [ "$STATUS" = "queued" ] || [ "$STATUS" = "in_progress" ] || [ "$STATUS" = "waiting" ]; then
                all_completed=false
              elif [ "$STATUS" = "completed" ] && [ "$CONCLUSION" != "success" ]; then
                any_failed=true
              fi
            done

            if [ "$any_failed" = true ]; then
              echo "Error: At least one workflow failed!"
              exit 1
            fi

            if [ "$all_completed" = true ]; then
              echo "All workflows completed successfully."
              break
            fi

            echo "Waiting 30 seconds for the next check..."
            sleep 30
          done

          echo "Processing artifacts..."
          shopt -s nullglob

          for item in "${WORKFLOWS[@]}"; do
            IFS=";" read -r wf_name wf_dir unzip_flag art_name <<< "$item"

            RUN_ID=$(gh run list --workflow="$wf_name" --branch="$GITHUB_REF_NAME" --event=workflow_dispatch --limit 1 --json id --jq '.[0].id' 2>/dev/null || echo "")
            if [ -z "$RUN_ID" ]; then
              echo "No run id for $wf_name; skipping."
              continue
            fi

            TMPDIR="./tmp_$wf_dir"
            echo "Downloading artifacts for '$wf_name' (Run: $RUN_ID) to $TMPDIR..."
            rm -rf "$TMPDIR"
            mkdir -p "$TMPDIR"

            gh run download "$RUN_ID" --dir "$TMPDIR" || { echo "Download failed for $wf_name (run $RUN_ID)"; exit 1; }

            echo "Contents of $TMPDIR:"
            ls -la "$TMPDIR" || true

            if [ "$unzip_flag" = "true" ]; then
              echo "Unzipping files for $wf_name..."
              shopt -s nullglob
              for zipfile in "$TMPDIR"/*.zip; do
                [ -f "$zipfile" ] || continue
                unzip -o "$zipfile" -d "$TMPDIR"
                rm -f "$zipfile"
              done
              shopt -u nullglob
            else
              if [ -n "$art_name" ]; then
                if [ -d "$TMPDIR/$art_name" ] && [ ! -f "$TMPDIR/${art_name}.zip" ]; then
                  echo "Zipping folder $art_name back into a single archive..."
                  (cd "$TMPDIR/$art_name" && zip -r "../${art_name}.zip" ./*) || { echo "zip failed for $art_name"; exit 1; }
                  rm -rf "$TMPDIR/$art_name"
                elif [ -f "$TMPDIR/${art_name}.zip" ]; then
                  echo "Archive already exists: $TMPDIR/${art_name}.zip"
                else
                  echo "Warning: neither folder nor zip '$art_name' found in $TMPDIR; listing:"
                  ls -la "$TMPDIR"
                fi
              fi
            fi

            cp -r "$TMPDIR"/* ./release-artifacts/ 2>/dev/null || true
            rm -rf "$TMPDIR"
          done

          find ./release-artifacts -mindepth 2 -type f -exec mv {} ./release-artifacts/ \; 2>/dev/null || true
          find ./release-artifacts -type d -empty -delete 2>/dev/null || true

          chmod +x ./release-artifacts/*.AppImage 2>/dev/null || true

          echo "Final release artifacts:"
          ls -lh ./release-artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v${{ env.APP_VERSION }}"
          echo "Dry-run: Checking files for release $TAG_NAME..."
          for file in ./release-artifacts/*; do
            if [ -f "$file" ]; then
              echo "Would upload: $(basename "$file")"
            fi
          done
          # gh release create "$TAG_NAME" ./release-artifacts/* \
          #   --title "Release $TAG_NAME" \
          #   --generate-notes \
          #   --target "$GITHUB_REF_NAME"

